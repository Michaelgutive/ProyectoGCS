services:
  api:
    build: .
    container_name: task-manager-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./tasks.db
    volumes:
      - ./app:/app/app  # Hot reload para desarrollo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
